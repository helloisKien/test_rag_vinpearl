# candidate/candidate_queue.yaml — CANDIDATE ontology (Phần 0.5 DA10 — BA THỨ TÁCH BIỆT).
# Owner: Trương Anh Long. Task 1.2 (v2) — Sprint 1.
#
# Concept ỨNG VIÊN, định nghĩa từ: review, faq, article, query log.
# CHƯA dùng cho retrieval. Quy trình lên Core (xem _meta.yaml > tiers.candidate.promotion):
#   keyword lạ lặp nhiều -> vào đây -> HUMAN duyệt -> thêm vào core/<facet>.yaml
#   -> generate lại synonym/expansion -> chạy golden set -> tốt hơn MỚI merge.
#
# HIỆN TRỐNG: chưa có review được ABSA, chưa có golden set, chưa có query log của DA09.
# Khi Sprint 2 (ABSA review) chạy hoặc nhận query log -> điền vào đây, KHÔNG tự thêm thẳng vào Core.

version: "2.0.0"

# Schema mỗi mục ứng viên:
candidate_schema:
  fields:
    candidate_keyword:   "surface form lạ gặp trong review/faq/query log"
    suggested_facet:     "facet dự đoán (object_type/amenity/purpose/style/...)"
    suggested_concept_id: "ID đề xuất nếu được duyệt (vd PURPOSE_STAYCATION)"
    frequency:           "số lần xuất hiện"
    examples:            "[câu trích dẫn nguồn]"
    source:              "review | faq | article | query_log | description (keyword scan)"
    status:              "pending | approved | rejected"

# ⚠ ĐỘ TIN: các ứng viên purpose dưới phát hiện bằng KEYWORD SCAN trên description/faq của 520
# hotel VN (KHÔNG phải ABSA trên review thật — review chưa crawl). frequency = số hotel có keyword
# trong description, là GỢI Ý độ phổ biến, CHƯA đủ mạnh để lên Core. Quy trình promote:
#   chờ review ABSA (Sprint 2) đo tần suất thật -> human duyệt -> golden set không giảm -> merge Core.
# Đã loại các purpose ĐÃ CÓ Core (wellness/romantic) khỏi danh sách ứng viên.

candidates:
  - candidate_keyword: "team building / hội nghị / sự kiện (MICE)"
    suggested_facet: purpose
    suggested_concept_id: PURPOSE_MICE          # MICE = Meetings, Incentives, Conferences, Events
    frequency: 107                              # 107/520 hotel (~20%) nhắc trong description/faq
    examples: ["team building", "hội nghị", "hội thảo", "tổ chức tiệc / gala", "sự kiện"]
    source: description
    status: deferred

  - candidate_keyword: "tiệc cưới / đám cưới (wedding)"
    suggested_facet: purpose
    suggested_concept_id: PURPOSE_WEDDING
    frequency: 24                               # 24/520 (~4%)
    examples: ["tiệc cưới", "đám cưới", "wedding"]
    source: description
    status: deferred

  - candidate_keyword: "workation / làm việc từ xa"
    suggested_facet: purpose
    suggested_concept_id: PURPOSE_WORKATION
    frequency: 10                               # 10/520 (~2%) — tần suất thấp
    examples: ["workation", "làm việc từ xa", "remote work"]
    source: description
    status: deferred

  - candidate_keyword: "phượt / backpacker"
    suggested_facet: purpose
    suggested_concept_id: PURPOSE_BACKPACKER
    frequency: 9                                # 9/520 (~2%) — tần suất thấp
    examples: ["phượt", "đi bụi", "backpacker"]
    source: description
    status: deferred

  - candidate_keyword: "staycation"
    suggested_facet: purpose
    suggested_concept_id: PURPOSE_STAYCATION
    frequency: 0                                # chưa thấy trong description; thường ở QUERY LOG/review
    examples: ["staycation", "nghỉ dưỡng tại chỗ"]
    source: query_log
    status: deferred

  # ── SETTING (bối cảnh): SETTING_RIVERSIDE đã lên Core (từ room_view hard). Còn lại chờ. ──
  - candidate_keyword: "nông thôn / thung lũng (countryside)"
    suggested_facet: setting
    suggested_concept_id: SETTING_COUNTRYSIDE
    frequency: 26                               # room_view "Hướng Nông thôn" (17) + "Thung lũng" (9)
    examples: ["Hướng Nông thôn", "Hướng Thung lũng"]
    source: description                          # từ room_view; tần suất thấp -> chờ
    status: deferred

  # ── STYLE: ứng viên từ keyword scan DESCRIPTION (nguồn YẾU/nhiễu cho style — description là lời
  #    tự quảng cáo, không phải cảm nhận khách). CHỜ review ABSA mới đủ tin để promote. ──
  - candidate_keyword: "cổ điển / hoài cổ (vintage)"
    suggested_facet: style
    suggested_concept_id: STYLE_VINTAGE
    frequency: 139                              # 139/520 (~26%) trong description — CHỈ là gợi ý
    examples: ["cổ điển", "hoài cổ", "cổ kính", "retro"]
    source: description
    status: deferred

  - candidate_keyword: "truyền thống / bản địa (traditional)"
    suggested_facet: style
    suggested_concept_id: STYLE_TRADITIONAL
    frequency: 416                              # 80% description — nhưng marketing-fluff, ĐỘ TIN THẤP
    examples: ["truyền thống", "bản địa", "đậm chất Việt", "văn hóa địa phương"]
    source: description
    status: deferred

  - candidate_keyword: "boutique / nghệ thuật / độc đáo"
    suggested_facet: style
    suggested_concept_id: STYLE_BOUTIQUE
    frequency: 426                              # 81% description — marketing-fluff, ĐỘ TIN THẤP
    examples: ["boutique", "nghệ thuật", "độc đáo", "phong cách riêng"]
    source: description
    status: deferred

  # ── AMENITY: 11 đáng lọc đã lên Core. Dưới là tiện ích giải trí NGÁCH (ít hotel) + dịch vụ
  #    vận hành phổ biến nhưng ÍT GIÁ TRỊ LỌC (gần như hotel nào cũng có) -> chờ duyệt. ──
  - candidate_keyword: "sân tennis / quần vợt"
    suggested_facet: amenity
    suggested_concept_id: AMEN_TENNIS
    frequency: 120
    examples: ["Sân quần vợt"]
    source: amenities
    status: approved                            # PROMOTE 2026-06-08 -> core/amenity.yaml (gom cả cầu lông)

  - candidate_keyword: "phòng yoga"
    suggested_facet: amenity
    suggested_concept_id: AMEN_YOGA
    frequency: 120
    examples: ["Phòng yoga"]
    source: amenities
    status: deferred                            # DEFER: tạm gộp AMEN_GYM; tách nếu query log đòi

  - candidate_keyword: "karaoke"
    suggested_facet: amenity
    suggested_concept_id: AMEN_KARAOKE
    frequency: 130
    examples: ["Karaoke"]
    source: amenities
    status: approved                            # PROMOTE 2026-06-08 -> core/amenity.yaml

  - candidate_keyword: "bi-a / bida"
    suggested_facet: amenity
    suggested_concept_id: AMEN_GAME_ROOM        # gộp bi-a + bóng bàn thành phòng giải trí
    frequency: 116
    examples: ["Bi-a", "Bóng bàn"]
    source: amenities
    status: approved                            # PROMOTE 2026-06-08 -> AMEN_GAME_ROOM

  - candidate_keyword: "thể thao nước (bơi xuồng / lặn / câu cá)"
    suggested_facet: amenity
    suggested_concept_id: AMEN_WATERSPORT
    frequency: 112                              # Bơi xuồng(112)+Lặn(106)+Câu cá(110) — gom
    examples: ["Bơi xuồng", "Lặn", "Câu cá"]
    source: amenities
    status: approved                            # PROMOTE 2026-06-08 -> core/amenity.yaml

  - candidate_keyword: "đi bộ đường dài / hiking"
    suggested_facet: amenity
    suggested_concept_id: AMEN_HIKING
    frequency: 130
    examples: ["Đi bộ đường dài"]
    source: amenities
    status: approved                            # PROMOTE 2026-06-08 -> core/amenity.yaml

  - candidate_keyword: "đổi ngoại tệ / rút tiền"
    suggested_facet: amenity
    suggested_concept_id: AMEN_CURRENCY_EXCHANGE
    frequency: 514                              # phổ biến nhưng dịch vụ vận hành, ít giá trị lọc
    examples: ["Đổi ngoại tệ", "Rút tiền mặt"]
    source: amenities
    status: rejected                            # REJECT 2026-06-08: không phân biệt khi search
