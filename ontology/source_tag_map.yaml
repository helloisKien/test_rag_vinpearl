# ===========================================================================
# _unmapped — vocabulary nguồn LẶP NHIỀU nhưng CHƯA có concept phù hợp.
#   => ứng viên candidate_queue. KHÔNG tự thêm core. (đối chiếu candidate_queue.yaml)
#   Ghi kèm tần suất (số hotel) + gợi ý concept_id nếu được duyệt.
# ===========================================================================
_unmapped:
  # ✅ ĐÃ PROMOTE (2026-06-08): Tennis, Karaoke, GameRoom(bi-a/bóng bàn), Watersport, Hiking
  #    -> đã chuyển lên mục `amenities` chính + thêm vào core/amenity.yaml.
  # ⏸ DEFER (chờ query log / review ABSA):
  amenities_defer:
    - {value: "Phòng yoga",   freq: 120, suggest: AMEN_YOGA,   note: "tạm map AMEN_GYM ở mục chính; tách riêng nếu query log đòi"}
    - {value: "Câu lạc bộ đêm", freq: 88, suggest: null,       note: "nightclub; gần STYLE_LIVELY — chờ review"}
    - {value: "Công viên nước", freq: 83, suggest: null,       note: "water park; gần PURPOSE_FAMILY — chờ tín hiệu"}
    - {value: "Công viên giải trí", freq: 45, suggest: null,   note: "thường là nearby landmark hơn amenity"}
    - {value: "Thư viện",     freq: 52,  suggest: null,        note: "chờ tín hiệu"}
  # ❌ REJECT (không phân biệt / ít giá trị lọc — KHÔNG promote):
  amenities_reject:
    - {value: "Đổi ngoại tệ", freq: 514, reason: "dịch vụ vận hành, gần như KS nào cũng có -> không phân biệt khi search"}
    - {value: "Cửa hàng tạp hóa", freq: 288, reason: "convenience, ít giá trị lọc"}
    - {value: "Tủ lạnh",      freq: 358, reason: "tiện nghi trong phòng phổ biến, không phân biệt"}
    - {value: "Sòng bạc",     freq: 47,  reason: "casino hiếm ở VN, không ai search"}

# ===========================================================================
# _skip — KHÔNG map (không mang ý nghĩa lọc tìm kiếm). Ghi lý do theo nhóm.
# ===========================================================================
_skip:
  groups:
    - {pattern: "Tiếng <ngôn ngữ>",       reason: "ngôn ngữ nhân viên phục vụ — không phải tiện ích lọc (Tiếng Anh/Việt/Hàn/Nga...)"}
    - {pattern: "Cách bãi biển X mét / Cách phương tiện công cộng X mét", reason: "khoảng cách — thuộc range_filters/nearby, KHÔNG phải amenity (~80 chuỗi đuôi)"}
    - {pattern: "Tọa lạc tại trung tâm <thành phố>", reason: "là location/SETTING_CITY_CENTER suy từ field location, không map qua amenity"}
    - {pattern: "an toàn COVID / khử trùng / khẩu trang / giãn cách", reason: "biện pháp vệ sinh tạm thời — không phải tiện ích phân biệt (Sản phẩm làm sạch chống virus, Khẩu trang miễn phí, Giãn cách 1 mét, Nhiệt kế cơ thể...)"}
    - {pattern: "vật dụng phòng vụn vặt", reason: "không mang giá trị lọc (Bộ kim chỉ, Đèn đọc sách, Ổ điện hạ thấp, Móc, Bàn là, TV, Tủ lạnh-mini, Gia vị thiết yếu...)"}
    - {pattern: "dịch vụ hành chính / lễ tân chung", reason: "phổ biến ~mọi KS, không phân biệt (Bàn tiếp tân 24 giờ, Giữ hành lý, Dịch vụ giặt là, Có cung cấp hóa đơn, Đổi tiền, Dịch vụ bưu chính...)"}
    - {pattern: "an ninh chung", reason: "Bảo vệ 24 giờ, CCTV — phổ biến, ít giá trị lọc"}
    - {pattern: "phòng không hút thuốc / hút thuốc", reason: "thuộc tính phòng, không phải amenity cơ sở"}
