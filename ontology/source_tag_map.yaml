# source_tag_map.yaml — Tầng 0 của ontology_mapper (Sprint 2, Bước 1)
# ---------------------------------------------------------------------------
# Map VOCABULARY NGUỒN (Agoda) -> concept_id ĐÃ TỒN TẠI trong ontology/core/*.
# Đây là lớp phủ rẻ & chắc nhất: tag nguồn -> concept, confidence cao (~0.95),
# source: "source_tag". ontology_mapper áp bảng này TRƯỚC rule/embedding/LLM.
#
# QUY TẮC (theo working agreement):
#   - CHỈ map sang concept_id có thật. KHÔNG bịa concept mới ở đây.
#   - Giá trị nguồn chưa có concept phù hợp -> để ở `_unmapped` (ứng viên candidate_queue,
#     CHỜ người duyệt + golden set; KHÔNG tự thêm vào core).
#   - Noise (ngôn ngữ phục vụ, khoảng cách "Cách bãi biển X mét", an toàn COVID, vật dụng
#     phòng vụn vặt) -> KHÔNG map, gom ở `_skip` kèm lý do.
#   - Mỗi trường nguồn map theo NGỮ CẢNH riêng của nó (xem từng block).
#
# Phủ: top ~90 chuỗi amenity (theo Pareto, >95% số lần xuất hiện) + 4 trường cố định.
# Số liệu khảo sát: docs/reports/ontology/sprint2/step0_data_survey.md
version: "1.0.0"
source: agoda
ontology_version: concepts_v2.0.0

# ===========================================================================
# 1. accommodation_type -> object_type (facet one)  — 13/13 giá trị
# ===========================================================================
accommodation_type:
  "Khách sạn":              OBJ_HOTEL
  "Resort":                 OBJ_RESORT
  "Căn hộ":                 OBJ_APARTMENT
  "Căn hộ dịch vụ":         OBJ_APARTMENT
  "Nhà dân":                OBJ_HOMESTAY
  "Toàn bộ căn nhà":        OBJ_HOMESTAY      # nguyên căn cho thuê ~ homestay/nhà riêng
  "Nhà khách / Nhà nghỉ B&B": OBJ_BNB
  "Giường và Bữa sáng":     OBJ_BNB
  "Nhà nghỉ":               OBJ_GUESTHOUSE
  "Nhà nghỉ ven đường":     OBJ_GUESTHOUSE
  "Biệt thự":               OBJ_VILLA
  "Biệt thự nghỉ dưỡng":    OBJ_VILLA
  "Bungalow":               OBJ_BUNGALOW

# ===========================================================================
# 2. suitable_for -> purpose (facet many)  — 6/6 giá trị
# ===========================================================================
suitable_for:
  "Khách du lịch một mình":      PURPOSE_SOLO
  "Cặp đôi":                     PURPOSE_ROMANTIC
  "Nhóm du khách":               PURPOSE_GROUP
  "Gia đình có trẻ nhỏ":         PURPOSE_FAMILY
  "Gia đình có thanh thiếu niên": PURPOSE_FAMILY
  "Khách đi công tác":           PURPOSE_BUSINESS

# ===========================================================================
# 3. view_types -> setting / amenity(view)  (many)  — "Hướng X"
#    Hướng nhìn ra biển/đại dương/bãi biển -> AMEN_SEA_VIEW (đã có surface "hướng biển").
#    Hướng ra cảnh quan tự nhiên -> setting tương ứng. Hướng đô thị/không-cảnh -> _skip.
# ===========================================================================
view_types:
  "Hướng Biển":                  AMEN_SEA_VIEW
  "Hướng Đại dương":             AMEN_SEA_VIEW
  "Hướng Đại dương (một phần)":  AMEN_SEA_VIEW
  "Hướng biển (hướng một phần)": AMEN_SEA_VIEW
  "Hướng Bãi biển":              AMEN_SEA_VIEW
  "Hướng Vịnh":                  AMEN_SEA_VIEW
  "Hướng Vịnh biển":             AMEN_SEA_VIEW
  "Hướng Núi":                   SETTING_MOUNTAIN
  "Hướng Thung lũng":            SETTING_MOUNTAIN
  "Hướng Sông":                  SETTING_RIVERSIDE
  "Hướng Hồ":                    SETTING_RIVERSIDE
  "Hướng Hồ (một phần)":         SETTING_RIVERSIDE
  "Hướng Vườn":                  SETTING_NATURE
  "Hướng Thiên nhiên":           SETTING_NATURE
  "Hướng Nông thôn":             SETTING_NATURE
  "Hướng Bể bơi":                AMEN_POOL          # nhìn ra hồ bơi -> có hồ bơi
  # _skip (không mang ý nghĩa lọc setting/amenity):
  #   "Hướng Thành phố", "Hướng Đường phố", "Hướng Ngoài trời", "Hướng Sân trong",
  #   "Hướng Công viên", "Hướng Không có cửa sổ", "Hướng Cảnh đêm"

