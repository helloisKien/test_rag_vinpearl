# core/aspect.yaml — facet: aspect (SOFT fact). Khía cạnh đánh giá dùng cho ABSA (Sprint 2).
# Core = khía cạnh chuẩn ngành (Agoda rating_breakdown/review tags, Booking review categories,
# Tripadvisor rating categories). TRUNG TÍNH: sentiment riêng, KHÔNG nhét tốt/xấu vào ID.
# Schema: xem ontology/_meta.yaml
concepts:

  ASPECT_CLEANLINESS:
    facet: aspect
    fact_type: soft
    tier: core
    provenance: [domain_knowledge, agoda, booking, tripadvisor]
